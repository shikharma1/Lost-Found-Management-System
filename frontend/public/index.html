<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- META -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#586bff" />
    <meta name="description" content="Student Authentication System - Secure Login & Dashboard" />

    <!-- TITLE -->
    <title>Student Auth System</title>

    <!-- FAVICON (optional add your own logo later) -->
    <link rel="icon" href="/favicon.ico" />

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FONT AWESOME (fixed link) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- GLOBAL STYLES -->
    <style>
      body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #eef2ff, #ffffff);
        -webkit-font-smoothing: antialiased;
      }

      /* Smooth page load */
      #root {
        min-height: 100vh;
      }

      /* Scrollbar styling (pro touch) */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: #586bff;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }

      /* Loader (shown before React loads) */
      .loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .loader div {
        width: 40px;
        height: 40px;
        border: 4px solid #ddd;
        border-top: 4px solid #586bff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <!-- LOADER -->
    <div class="loader" id="loader">
      <div></div>
    </div>

    <!-- ROOT -->
    <div id="root"></div>

    <!-- NOSCRIPT -->
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- REMOVE LOADER AFTER LOAD -->
    <script>
      window.addEventListener("load", () => {
        const loader = document.getElementById("loader");
        loader.style.display = "none";
      });
    </script>
  </body>
</html>
